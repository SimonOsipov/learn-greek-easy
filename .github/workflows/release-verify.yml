name: Release Verify

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
        type: string
      pr_head_sha:
        description: 'PR head commit SHA'
        required: true
        type: string
      pr_head_ref:
        description: 'PR head branch (for Railway branch var)'
        required: false
        type: string
      pr_labels:
        description: 'JSON array of PR label names'
        required: false
        type: string
        default: '[]'

concurrency:
  group: dev-release-lease
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ inputs.pr_number }}
  PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
  # Dev environment URL (backend is private, accessed via frontend proxy)
  DEV_FRONTEND_URL: frontend-dev-8db9.up.railway.app

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  # =============================================================================
  # JOB 0b: Detect Changed Areas (duplicated leaf — needs: cannot span workflows)
  # =============================================================================
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 'every' = a file must match ALL patterns in a filter to count.
          # Without it (default 'some'), the '**' pattern matches every file, so
          # `web` was always true and a mobile-only PR still ran the web suite.
          # With 'every', a mobile file matches '**' but fails '!learn-greek-easy-mobile/**',
          # so a mobile-only diff yields web=false. (mobile filter has one pattern → unaffected.)
          predicate-quantifier: 'every'
          filters: |
            mobile:
              - 'learn-greek-easy-mobile/**'
            web:
              - '**'
              - '!learn-greek-easy-mobile/**'
              # Docs-only changes don't need the web test suite / preview deploy.
              # (A mixed code+docs PR still runs web: code files pass these negations.)
              - '!**/*.md'
              - '!docs/**'
              - '!**/docs/**'

  # =============================================================================
  # JOB 2: Check Deploy Conditions
  # Purpose: Determine if preview should be deployed based on changed files
  # Docs-only changes (*.md, docs/*) are automatically skipped
  # (release is implied here — no run_full / release_requested checks needed)
  # =============================================================================
  should-deploy:
    name: Check Deploy Conditions
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        run: |
          # Get changed files between PR base and head
          BASE_REF="main"
          CHANGED_FILES=$(git diff --name-only origin/${BASE_REF}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if any non-docs files changed
          if echo "$CHANGED_FILES" | grep -qvE '^(docs/|.*\.md$|\.github/.*\.md$)'; then
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "Non-documentation changes detected - will deploy preview"
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "Only documentation changes - skipping preview deployment"
          fi

  # =============================================================================
  # JOB 3: Deploy Preview
  # Purpose: Deploy frontend and backend to Railway dev environment
  # =============================================================================
  deploy:
    name: Deploy
    needs: [changes, should-deploy]
    if: needs.should-deploy.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    outputs:
      frontend_url: ${{ steps.urls.outputs.frontend_url }}
      environment_id: ${{ steps.urls.outputs.environment_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Show deployment context
        run: |
          echo "=== Deployment Context ==="
          echo "PR Number: ${{ env.PR_NUMBER }}"
          echo "PR Branch: ${{ inputs.pr_head_ref }}"
          echo "Commit SHA: ${{ inputs.pr_head_sha }}"
          echo "Short SHA: $(echo ${{ inputs.pr_head_sha }} | cut -c1-7)"
          echo ""
          echo "=== Repository Structure ==="
          ls -la
          echo ""
          echo "=== Backend Directory ==="
          ls -la learn-greek-easy-backend/ | head -20
          echo ""
          echo "=== Frontend Directory ==="
          ls -la learn-greek-easy-frontend/ | head -20
          echo ""
          echo "=== Railway CLI Version ==="
          railway --version

      - name: Link to dev environment
        id: env
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          # Dev environment for PR previews
          # This environment is persistent to maintain stable URLs (for Google OAuth, etc.)
          # Services are stopped on PR merge but environment is preserved
          ENV_NAME="dev"
          echo "Using dev environment for PR preview"

          # Link to dev environment
          echo "Linking to dev environment..."
          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment "$ENV_NAME" \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

          # Get current environment status
          echo "=== Environment Status ==="
          railway status 2>&1 || true

          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT

      - name: Set version environment variables
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          DEPLOY_ENV="${{ steps.env.outputs.env_name }}"
          echo "=== Setting version environment variables ==="

          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment "$DEPLOY_ENV" \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

          # Set commit SHA and branch for both services
          # Use PR head SHA (not merge commit) for clearer version tracking
          PR_HEAD_SHA="${{ inputs.pr_head_sha }}"
          HEAD_REF="${{ inputs.pr_head_ref }}"
          echo "Setting RAILWAY_GIT_COMMIT_SHA=$PR_HEAD_SHA (PR head commit)"
          echo "Setting RAILWAY_GIT_BRANCH=$HEAD_REF"

          railway variables \
            --set "RAILWAY_GIT_COMMIT_SHA=$PR_HEAD_SHA" \
            --set "RAILWAY_GIT_BRANCH=$HEAD_REF" \
            --set "DEBUG=true" \
            --service Backend \
            --skip-deploys

          railway variables \
            --set "RAILWAY_GIT_COMMIT_SHA=$PR_HEAD_SHA" \
            --set "RAILWAY_GIT_BRANCH=$HEAD_REF" \
            --service Frontend \
            --skip-deploys

          # Note: CORS_ORIGINS and BACKEND_URL are pre-configured in the dev environment
          # - CORS_ORIGINS=https://${{ env.DEV_FRONTEND_URL }},http://localhost:5173,http://localhost:3000
          # - BACKEND_URL=http://backend.railway.internal:8080

      # Note: Postgres and Redis are always kept running in dev environment
      # They are stateful services that are never stopped during cleanup
      # This avoids issues with `railway redeploy` failing on stopped services

      - name: Deploy Backend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          DEPLOY_ENV="${{ steps.env.outputs.env_name }}"
          echo "=== Deploying Backend to environment: $DEPLOY_ENV ==="
          echo "Deploying commit: ${{ inputs.pr_head_sha }}"

          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment "$DEPLOY_ENV" \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

          cd learn-greek-easy-backend
          echo "In backend directory: $(pwd)"
          echo "Files to deploy:"
          ls -la

          # Deploy using railway up with --ci flag
          # --ci waits for deployment to succeed or fail (includes health check)
          echo "Starting railway up for Backend (waiting for health check)..."
          railway up --ci --service Backend
          echo "Backend deployment completed successfully"
        timeout-minutes: 10

      - name: Wait for Railway internal DNS propagation
        run: |
          echo "=== Waiting for Railway internal DNS propagation ==="
          echo "Backend received a new internal IP after redeploy."
          echo "Waiting 60 seconds for DNS to propagate before health checks..."
          echo "This ensures Caddy has fresh DNS when health checks run."
          sleep 60
          echo "DNS propagation wait complete"

      - name: Deploy Frontend
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          DEPLOY_ENV="${{ steps.env.outputs.env_name }}"
          echo "=== Deploying Frontend to environment: $DEPLOY_ENV ==="
          echo "Deploying commit: ${{ inputs.pr_head_sha }}"

          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment "$DEPLOY_ENV" \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

          cd learn-greek-easy-frontend
          echo "In frontend directory: $(pwd)"
          echo "Files to deploy:"
          ls -la

          # Deploy using railway up with --ci flag
          # --ci waits for deployment to succeed or fail (includes health check)
          echo "Starting railway up for Frontend (waiting for health check)..."
          railway up --ci --service Frontend
          echo "Frontend deployment completed successfully"
        timeout-minutes: 10

      - name: Get deployment URLs
        id: urls
        run: |
          # Dev environment URL from workflow env vars
          # Backend is private - accessed via frontend proxy
          FRONTEND_URL="https://${{ env.DEV_FRONTEND_URL }}"
          DEPLOY_ENV="${{ steps.env.outputs.env_name }}"

          echo "=== Dev Environment URLs ==="
          echo "Frontend URL: $FRONTEND_URL"
          echo "Backend API: $FRONTEND_URL/api/v1 (via frontend proxy)"
          echo "Environment: $DEPLOY_ENV"

          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "environment_id=$DEPLOY_ENV" >> $GITHUB_OUTPUT

  # =============================================================================
  # JOB 4: Health and Smoke Tests
  # Purpose: Wait for services to start and verify they respond correctly
  # Tests: frontend health, backend health/live/ready, API docs
  # =============================================================================
  health-check:
    name: Health and Smoke Tests
    needs: [deploy]
    if: needs.deploy.result == 'success' && needs.deploy.outputs.frontend_url != ''
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.health.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Warm up Backend
        run: |
          FRONTEND_URL="${{ needs.deploy.outputs.frontend_url }}"
          echo "=== Warming up Backend via frontend proxy at $FRONTEND_URL ==="
          chmod +x scripts/backend-warmup.sh
          # Backend is private - warmup via frontend proxy using /api/v1/health endpoints
          # Use same parameters as production (10 requests, 3s delay) for consistent initialization
          ./scripts/backend-warmup.sh "$FRONTEND_URL" 10 3

      - name: Wait for DNS stabilization
        run: |
          echo "Waiting 10 seconds for DNS stabilization after warmup..."
          sleep 10

      - name: Run Health Checks
        id: health
        run: |
          # Use frontend URL for both since backend is private (no public domain)
          # Frontend proxies /health/* to backend via internal network
          chmod +x scripts/preview-health-check.sh
          # Backend is private - health checks via frontend proxy
          if ./scripts/preview-health-check.sh \
            "${{ needs.deploy.outputs.frontend_url }}" \
            30 \
            10; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Run API Smoke Tests
        id: smoke
        if: steps.health.outputs.status == 'success'
        run: |
          # Use frontend URL since backend is private (no public domain)
          # Frontend proxies /health/*, /api/*, /docs, /redoc, /openapi.json to backend
          chmod +x scripts/preview-api-smoke.sh
          # Backend is private - smoke tests via frontend proxy
          ./scripts/preview-api-smoke.sh "${{ needs.deploy.outputs.frontend_url }}" || true
          # API smoke tests are informational - don't fail the job

      - name: Upload Health Check Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: health-check-results
          path: |
            health-check-results.json
            api-smoke-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Create Status Check
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.health.outputs.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: status === 'success' ? 'success' : 'failure',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: status === 'success' ? 'Health checks passed' : 'Health checks failed',
              context: 'preview/health'
            });

  # =============================================================================
  # JOB: Health Check PR Comment
  # Purpose: Post detailed health check report as a dedicated PR comment
  # =============================================================================
  health-check-comment:
    name: Health Check PR Comment
    needs: [health-check]
    if: needs.health-check.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Download Health Check Results
        uses: actions/download-artifact@v5
        with:
          name: health-check-results
          path: health-data/

      - name: Parse Health Check Results
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          HEALTH_CHECK_REPORT_PATH: ./health-data/health-check-results.json
        run: |
          node learn-greek-easy-frontend/scripts/parse-health-check-results.cjs

      - name: Read Comment Body
        id: comment
        run: |
          if [ -f health-check-comment.md ]; then
            {
              echo 'body<<EOF'
              cat health-check-comment.md
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "body=:warning: Health check results are not available." >> $GITHUB_OUTPUT
          fi

      - name: Post Health Check Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: health-check-report
          message: ${{ steps.comment.outputs.body }}

  # =============================================================================
  # JOB 5: Seed Dev Database
  # Purpose: Populate the dev database with test data for E2E testing
  # Uses the seed API endpoint to create users, decks, cards, and progress data
  # =============================================================================
  seed-database:
    name: Seed Dev Database
    needs: [deploy, health-check]
    if: needs.health-check.outputs.status == 'success'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.seed.outputs.status }}

    steps:
      - name: Seed Database
        id: seed
        run: |
          echo "=== Seeding Dev Database ==="
          # Backend is private - seed via frontend proxy
          FRONTEND_URL="${{ needs.deploy.outputs.frontend_url }}"

          # Check if seeding is enabled
          STATUS_RESPONSE=$(curl -s "$FRONTEND_URL/api/v1/test/seed/status" || echo '{"enabled": false}')
          echo "Seed status: $STATUS_RESPONSE"

          ENABLED=$(echo $STATUS_RESPONSE | jq -r '.enabled')
          if [ "$ENABLED" != "true" ]; then
            echo "WARNING: Seeding is not enabled in dev environment"
            echo "Set TEST_SEED_ENABLED=true in Railway to enable"
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Call seed endpoint (pass pr_number for per-PR user namespacing — RGATE-05)
          RESPONSE=$(curl -s -X POST "$FRONTEND_URL/api/v1/test/seed/all" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": \"${{ env.PR_NUMBER }}\"}")
          echo "Seed response: $RESPONSE"

          # Verify success
          SUCCESS=$(echo $RESPONSE | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "ERROR: Seeding failed"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Database seeded successfully"
          echo "status=success" >> $GITHUB_OUTPUT

  # =============================================================================
  # JOB 5b: Mobile E2E + Visual Gate (MOB-15)
  # Purpose: Build the native iOS dev-profile app, start Metro, run Maestro
  # onboarding + smoke flows against the live dev preview, and verify
  # the onboarding reset endpoint leaves no residue.
  # Only runs on mobile PRs; depends on deploy + seed completing successfully.
  # =============================================================================
  mobile-e2e:
    name: Mobile E2E + Visual Gate
    needs: [deploy, seed-database, changes]
    if: |
      needs.changes.outputs.mobile == 'true' &&
      needs.deploy.result == 'success' &&
      needs.seed-database.result == 'success'
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: learn-greek-easy-mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      CI_DEV_LAUNCH_URL: http://127.0.0.1:8081
      CI_DEV_MENU_ONBOARDING_FINISHED: 'true'
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      API_URL: ${{ needs.deploy.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Assert Xcode major version 26
        run: |
          XCODE_VERSION="$(xcodebuild -version | head -n1 | awk '{print $2}')"
          echo "xcodebuild reports: $XCODE_VERSION"
          MAJOR="${XCODE_VERSION%%.*}"
          if [ "$MAJOR" != "26" ]; then
            echo "::error::Expected Xcode major 26, got $XCODE_VERSION — gate cannot proceed (no fallback)."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Install EAS CLI + Maestro
        run: |
          npm install -g eas-cli@20.0.0
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Compute native fingerprint
        id: fp
        run: |
          HASH="$(node node_modules/@expo/fingerprint/bin/cli.js \
            fingerprint:generate --platform ios | jq -r .hash)"
          echo "Native fingerprint: $HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache native simulator app
        id: app-cache
        uses: actions/cache@v4
        with:
          path: learn-greek-easy-mobile/build
          key: ios-app-${{ runner.os }}-xcode26.4-development-${{ steps.fp.outputs.hash }}

      - name: Build local dev-profile simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          eas build --local \
            --non-interactive \
            --profile development \
            --platform ios \
            --output ./build.tar.gz

      - name: Extract .app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p build && tar -xzf build.tar.gz -C build

      - name: Resolve APP_PATH
        run: |
          APP_PATH="$(find build -maxdepth 2 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found under build/ (cache-hit=${{ steps.app-cache.outputs.cache-hit }})"
            exit 1
          fi
          echo "Using app: $APP_PATH  (cache-hit=${{ steps.app-cache.outputs.cache-hit }})"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Boot iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oE '\([0-9A-F-]{36}\)' | tr -d '()')
          echo "SIM_UDID=$DEVICE" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Install app on simulator
        run: xcrun simctl install "$SIM_UDID" "$APP_PATH"

      - name: Reset onboarding state (pre-test)
        run: |
          FRONTEND_URL="${{ needs.deploy.outputs.frontend_url }}"
          echo "=== Resetting onboarding state before test run ==="
          RESPONSE=$(curl -s -X POST "$FRONTEND_URL/api/v1/test/seed/reset-onboarding" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": \"${{ env.PR_NUMBER }}\"}")
          echo "Reset response: $RESPONSE"
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Pre-test reset-onboarding failed: $RESPONSE"
            exit 1
          fi
          echo "Onboarding state reset successfully"

      - name: Start Metro (dev-client)
        env:
          APP_VARIANT: development
          REACT_NATIVE_PACKAGER_HOSTNAME: 127.0.0.1
        run: |
          CI=1 npx expo start --dev-client --port 8081 \
            > "$RUNNER_TEMP/metro.log" 2>&1 &
          echo "METRO_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Metro to be ready
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8081/status >/dev/null 2>&1; then
              echo "Metro is up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "::error::Metro did not become ready on :8081 within 120s"
          cat "$RUNNER_TEMP/metro.log" || true
          exit 1

      - name: Verify dev-client loads the JS bundle from Metro
        run: |
          bundle_served() {
            grep -qiE 'iOS Bundled [0-9]+ ?ms|Bundling complete|\.bundle\?platform=ios|virtual-metro-entry\.bundle' "$RUNNER_TEMP/metro.log"
          }
          for attempt in 1 2 3 4 5; do
            echo "::group::Launch attempt $attempt"
            xcrun simctl terminate "$SIM_UDID" eu.greeklish.app.dev 2>/dev/null || true
            sleep 2
            xcrun simctl launch "$SIM_UDID" eu.greeklish.app.dev --initialUrl http://127.0.0.1:8081 || true
            for i in $(seq 1 60); do
              if bundle_served; then
                echo "Metro served the iOS bundle (attempt $attempt, ${i}s)"
                echo "::endgroup::"
                exit 0
              fi
              sleep 1
            done
            echo "attempt $attempt: bundle not served within 60s, retrying"
            echo "::endgroup::"
          done
          echo "::error::dev-client never requested the JS bundle from Metro after 5 launch attempts"
          cat "$RUNNER_TEMP/metro.log" || true
          exit 1

      - name: Compute E2E email for Maestro (RGATE-05)
        run: |
          if [ -n "${{ env.PR_NUMBER }}" ]; then
            EMAIL="e2e_beginner+pr${{ env.PR_NUMBER }}@test.com"
          else
            EMAIL="e2e_beginner@test.com"
          fi
          echo "E2E_EMAIL=$EMAIL" >> "$GITHUB_ENV"

      - name: Run Maestro onboarding flow
        run: maestro test --env E2E_EMAIL="$E2E_EMAIL" .maestro/onboarding.yaml

      - name: Run Maestro smoke flow
        run: maestro test .maestro/smoke.yaml

      - name: Reset onboarding state (post-test cleanup)
        if: always()
        run: |
          FRONTEND_URL="${{ needs.deploy.outputs.frontend_url }}"
          echo "=== Resetting onboarding state after test run ==="
          RESPONSE=$(curl -s -X POST "$FRONTEND_URL/api/v1/test/seed/reset-onboarding" \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": \"${{ env.PR_NUMBER }}\"}")
          echo "Reset response: $RESPONSE"
          # Verify no residue: tour_completed_at must be null in the response
          TOUR_COMPLETED=$(echo "$RESPONSE" | jq -r '.results.tour_completed_at')
          if [ "$TOUR_COMPLETED" != "null" ]; then
            echo "::error::Post-test reset-onboarding left residue: tour_completed_at=$TOUR_COMPLETED"
            exit 1
          fi
          echo "Onboarding state clean (tour_completed_at=null)"

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mobile-e2e-maestro
          path: |
            /Users/runner/.maestro/tests/
            ${{ runner.temp }}/metro.log
          if-no-files-found: warn
          retention-days: 7

  # =============================================================================
  # JOB 5c: Web Verify — Authenticated (RGATE-03)
  # Purpose: Log in as the seeded e2e_beginner user, confirm the dashboard
  # renders, and confirm the deck list is non-empty.
  # Only runs on web PRs; depends on deploy + seed completing successfully.
  # =============================================================================
  web-verify:
    name: Web Verify (authenticated)
    needs: [deploy, seed-database, changes]
    if: |
      needs.changes.outputs.web == 'true' &&
      needs.deploy.result == 'success' &&
      needs.seed-database.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-frontend/package-lock.json
      - name: Install dependencies
        working-directory: learn-greek-easy-frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: learn-greek-easy-frontend
        run: npx playwright install chromium
      - name: Run authenticated web verify
        working-directory: learn-greek-easy-frontend
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.frontend_url }}
        run: node scripts/release-web-verify.cjs
      - name: Upload web verify screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: web-verify-screenshots
          path: learn-greek-easy-frontend/web-verify-reports/
          if-no-files-found: warn
          retention-days: 7

  # =============================================================================
  # JOB 6: K6 Performance Tests
  # Purpose: Run k6 load tests against preview environment
  # Runs by default on ready PRs, skip with 'skip-k6' label
  # Non-blocking: continue-on-error: true to prevent blocking PR merge
  # =============================================================================
  k6-performance:
    name: K6 Performance Tests
    needs: [deploy, health-check, seed-database]
    if: |
      needs.health-check.outputs.status == 'success' &&
      needs.seed-database.outputs.status == 'success' &&
      !contains(fromJSON(inputs.pr_labels), 'skip-k6')
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      status: ${{ steps.results.outputs.status }}
      auth_p95: ${{ steps.results.outputs.auth_p95 }}
      dashboard_p95: ${{ steps.results.outputs.dashboard_p95 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup k6 with browser support
        uses: grafana/setup-k6-action@v1
        with:
          browser: true

      - name: Create reports directory
        run: mkdir -p k6/reports

      - name: Run Auth Scenario
        id: auth
        continue-on-error: true
        env:
          K6_ENV: preview
          # Backend is private - K6 accesses API via frontend proxy
          K6_API_BASE_URL: ${{ needs.deploy.outputs.frontend_url }}
          K6_FRONTEND_BASE_URL: ${{ needs.deploy.outputs.frontend_url }}
          K6_SCENARIO: smoke
          K6_BROWSER_HEADLESS: 'true'
          K6_BROWSER_ARGS: 'no-sandbox,disable-dev-shm-usage,disable-gpu'
        run: |
          echo "Running K6 Auth Scenario"
          echo "Frontend: $K6_FRONTEND_BASE_URL"
          echo "Backend API: $K6_API_BASE_URL (via frontend proxy)"

          k6 run k6/scenarios/auth.js 2>&1 | tee k6/reports/auth-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Dashboard Scenario
        id: dashboard
        continue-on-error: true
        env:
          K6_ENV: preview
          # Backend is private - K6 accesses API via frontend proxy
          K6_API_BASE_URL: ${{ needs.deploy.outputs.frontend_url }}
          K6_FRONTEND_BASE_URL: ${{ needs.deploy.outputs.frontend_url }}
          K6_SCENARIO: smoke
          K6_BROWSER_HEADLESS: 'true'
          K6_BROWSER_ARGS: 'no-sandbox,disable-dev-shm-usage,disable-gpu'
        run: |
          echo "Running K6 Dashboard Scenario"

          k6 run k6/scenarios/dashboard.js 2>&1 | tee k6/reports/dashboard-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Aggregate Results
        id: results
        if: always()
        run: |
          AUTH_EXIT="${{ steps.auth.outputs.exit_code }}"
          DASHBOARD_EXIT="${{ steps.dashboard.outputs.exit_code }}"

          if [ "$AUTH_EXIT" = "0" ] && [ "$DASHBOARD_EXIT" = "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

          # Extract p95 from JSON reports if they exist
          AUTH_P95="N/A"
          DASHBOARD_P95="N/A"

          for f in k6/reports/auth-preview-*.json; do
            if [ -f "$f" ]; then
              AUTH_P95=$(jq -r '.metrics.auth_total_time.values["p(95)"] // "N/A"' "$f" 2>/dev/null || echo "N/A")
              break
            fi
          done

          for f in k6/reports/dashboard-preview-*.json; do
            if [ -f "$f" ]; then
              DASHBOARD_P95=$(jq -r '.metrics.dashboard_flow_total_time.values["p(95)"] // "N/A"' "$f" 2>/dev/null || echo "N/A")
              break
            fi
          done

          echo "auth_p95=${AUTH_P95}" >> $GITHUB_OUTPUT
          echo "dashboard_p95=${DASHBOARD_P95}" >> $GITHUB_OUTPUT

      - name: Upload K6 Reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: k6-performance-reports
          path: k6/reports/
          retention-days: 30
          if-no-files-found: ignore

  # =============================================================================
  # JOB: K6 Performance PR Comment
  # Purpose: Post detailed k6 performance report as a dedicated PR comment
  # =============================================================================
  k6-comment:
    name: K6 Performance PR Comment
    needs: [k6-performance]
    if: needs.k6-performance.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Download K6 Reports
        uses: actions/download-artifact@v5
        with:
          name: k6-performance-reports
          path: k6-data/

      - name: Parse K6 Results
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          K6_REPORTS_DIR: ./k6-data
        run: |
          node learn-greek-easy-frontend/scripts/parse-k6-results.cjs

      - name: Read Comment Body
        id: comment
        run: |
          if [ -f k6-comment.md ]; then
            {
              echo 'body<<EOF'
              cat k6-comment.md
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "body=:warning: K6 performance results are not available." >> $GITHUB_OUTPUT
          fi

      - name: Post K6 Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: k6-performance-report
          message: ${{ steps.comment.outputs.body }}

  # =============================================================================
  # JOB 7: Accessibility Tests
  # Purpose: Scan pages for WCAG 2.1 AA violations using axe-core
  # Pages tested: Home, Login, Register
  # Note: Runs in parallel with k6-performance (doesn't depend on seeded data)
  # =============================================================================
  accessibility:
    name: Accessibility Tests (axe-core)
    needs: [deploy, health-check]
    if: needs.health-check.outputs.status == 'success'
    runs-on: ubuntu-latest
    env:
      VITE_ENVIRONMENT: test
      ENVIRONMENT: test
    outputs:
      status: ${{ steps.a11y.outputs.status }}
      violations: ${{ steps.a11y.outputs.violations }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-frontend/package-lock.json

      - name: Install dependencies
        working-directory: learn-greek-easy-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: learn-greek-easy-frontend
        run: npx playwright install chromium

      - name: Run Accessibility Tests
        id: a11y
        working-directory: learn-greek-easy-frontend
        env:
          FRONTEND_URL: ${{ needs.deploy.outputs.frontend_url }}
        run: |
          if node scripts/accessibility-test.cjs; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "violations=0" >> $GITHUB_OUTPUT
          else
            # Capture violations count even on failure
            if [ -f accessibility-report.json ]; then
              VIOLATIONS=$(cat accessibility-report.json | jq '.summary.critical + .summary.serious')
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
            else
              echo "status=failure" >> $GITHUB_OUTPUT
              echo "violations=unknown" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload Accessibility Report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: accessibility-report
          path: |
            learn-greek-easy-frontend/accessibility-report.json
            learn-greek-easy-frontend/accessibility-report.md
          retention-days: 7
          if-no-files-found: ignore

      - name: Create Status Check
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ steps.a11y.outputs.status }}';
            const violations = '${{ steps.a11y.outputs.violations }}';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: status === 'success' ? 'success' : 'failure',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: status === 'success'
                ? 'No critical accessibility violations'
                : `${violations} critical/serious violations found`,
              context: 'preview/a11y'
            });

  # =============================================================================
  # JOB: Accessibility PR Comment
  # Purpose: Post detailed accessibility report as a dedicated PR comment
  # =============================================================================
  accessibility-comment:
    name: Accessibility PR Comment
    needs: [accessibility]
    if: needs.accessibility.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Download Accessibility Report
        uses: actions/download-artifact@v5
        with:
          name: accessibility-report
          path: accessibility-data/

      - name: Parse Accessibility Results
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          cp accessibility-data/accessibility-report.json ./accessibility-report.json
          node learn-greek-easy-frontend/scripts/parse-accessibility-results.cjs
          mv accessibility-comment.md accessibility-data/

      - name: Read Comment Body
        id: comment
        run: |
          if [ -f accessibility-data/accessibility-comment.md ]; then
            {
              echo 'body<<EOF'
              cat accessibility-data/accessibility-comment.md
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "body=:warning: Accessibility results are not available." >> $GITHUB_OUTPUT
          fi

      - name: Post Accessibility Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: accessibility-report
          message: ${{ steps.comment.outputs.body }}

  # =============================================================================
  # JOB 8: Lighthouse CI
  # Purpose: Measure performance, accessibility, best practices, SEO
  # Runs both desktop and mobile configurations
  # =============================================================================
  lighthouse:
    name: Lighthouse CI
    needs: [deploy, health-check]
    if: needs.health-check.outputs.status == 'success'
    runs-on: ubuntu-latest
    outputs:
      desktop_score: ${{ steps.lighthouse.outputs.desktop_score }}
      mobile_score: ${{ steps.lighthouse.outputs.mobile_score }}
      desktop_a11y: ${{ steps.lighthouse.outputs.desktop_a11y }}
      mobile_a11y: ${{ steps.lighthouse.outputs.mobile_a11y }}
      report_url: ${{ steps.lighthouse.outputs.report_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI (Desktop)
        id: lhci-desktop
        working-directory: learn-greek-easy-frontend
        env:
          LIGHTHOUSE_URLS: "${{ needs.deploy.outputs.frontend_url }},${{ needs.deploy.outputs.frontend_url }}/login,${{ needs.deploy.outputs.frontend_url }}/register"
        run: |
          echo "=== Running Lighthouse CI (Desktop) ==="
          echo "URLs: $LIGHTHOUSE_URLS"

          lhci collect --config=lighthouserc.cjs
          lhci assert --config=lighthouserc.cjs || true
          lhci upload --config=lighthouserc.cjs

          # Debug: List files in .lighthouseci
          echo "=== Files in .lighthouseci ==="
          ls -la .lighthouseci/ 2>/dev/null || echo "Directory not found"

          # Extract scores from LHR JSON files (lhr-*.json)
          LHR_FILE=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -n "$LHR_FILE" ]; then
            echo "=== Desktop Results (from $LHR_FILE) ==="
            PERF_SCORE=$(cat "$LHR_FILE" | jq -r '(.categories.performance.score // 0) * 100 | floor')
            A11Y_SCORE=$(cat "$LHR_FILE" | jq -r '(.categories.accessibility.score // 0) * 100 | floor')
            echo "Performance: $PERF_SCORE"
            echo "Accessibility: $A11Y_SCORE"
            echo "desktop_score=$PERF_SCORE" >> $GITHUB_OUTPUT
            echo "desktop_a11y=$A11Y_SCORE" >> $GITHUB_OUTPUT
          else
            echo "Warning: No LHR JSON files found in .lighthouseci"
            echo "desktop_score=0" >> $GITHUB_OUTPUT
            echo "desktop_a11y=0" >> $GITHUB_OUTPUT
          fi

      - name: Preserve Desktop Reports
        working-directory: learn-greek-easy-frontend
        run: |
          # Save desktop reports before mobile run overwrites them
          mkdir -p lighthouse-reports/desktop
          cp -r .lighthouseci/*.html lighthouse-reports/desktop/ 2>/dev/null || true
          cp -r .lighthouseci/*.json lighthouse-reports/desktop/ 2>/dev/null || true

          # Save desktop links.json for report URL
          if [ -f .lighthouseci/links.json ]; then
            cp .lighthouseci/links.json lighthouse-reports/desktop-links.json
          fi

          # Clear for mobile run
          rm -rf .lighthouseci

      - name: Run Lighthouse CI (Mobile)
        id: lhci-mobile
        working-directory: learn-greek-easy-frontend
        env:
          LIGHTHOUSE_URLS: "${{ needs.deploy.outputs.frontend_url }},${{ needs.deploy.outputs.frontend_url }}/login,${{ needs.deploy.outputs.frontend_url }}/register"
        run: |
          echo "=== Running Lighthouse CI (Mobile) ==="
          echo "URLs: $LIGHTHOUSE_URLS"

          lhci collect --config=lighthouserc.mobile.cjs
          lhci assert --config=lighthouserc.mobile.cjs || true
          lhci upload --config=lighthouserc.mobile.cjs

          # Debug: List files in .lighthouseci
          echo "=== Files in .lighthouseci ==="
          ls -la .lighthouseci/ 2>/dev/null || echo "Directory not found"

          # Extract scores from LHR JSON files (lhr-*.json)
          LHR_FILE=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -n "$LHR_FILE" ]; then
            echo "=== Mobile Results (from $LHR_FILE) ==="
            PERF_SCORE=$(cat "$LHR_FILE" | jq -r '(.categories.performance.score // 0) * 100 | floor')
            A11Y_SCORE=$(cat "$LHR_FILE" | jq -r '(.categories.accessibility.score // 0) * 100 | floor')
            echo "Performance: $PERF_SCORE"
            echo "Accessibility: $A11Y_SCORE"
            echo "mobile_score=$PERF_SCORE" >> $GITHUB_OUTPUT
            echo "mobile_a11y=$A11Y_SCORE" >> $GITHUB_OUTPUT
          else
            echo "Warning: No LHR JSON files found in .lighthouseci"
            echo "mobile_score=0" >> $GITHUB_OUTPUT
            echo "mobile_a11y=0" >> $GITHUB_OUTPUT
          fi

          # Save mobile reports
          mkdir -p lighthouse-reports/mobile
          cp -r .lighthouseci/*.html lighthouse-reports/mobile/ 2>/dev/null || true
          cp -r .lighthouseci/*.json lighthouse-reports/mobile/ 2>/dev/null || true

      - name: Aggregate Results
        id: lighthouse
        working-directory: learn-greek-easy-frontend
        run: |
          echo "desktop_score=${{ steps.lhci-desktop.outputs.desktop_score }}" >> $GITHUB_OUTPUT
          echo "mobile_score=${{ steps.lhci-mobile.outputs.mobile_score }}" >> $GITHUB_OUTPUT
          echo "desktop_a11y=${{ steps.lhci-desktop.outputs.desktop_a11y }}" >> $GITHUB_OUTPUT
          echo "mobile_a11y=${{ steps.lhci-mobile.outputs.mobile_a11y }}" >> $GITHUB_OUTPUT

          # Get report URL from desktop links (first uploaded)
          if [ -f lighthouse-reports/desktop-links.json ]; then
            REPORT_URL=$(cat lighthouse-reports/desktop-links.json | jq -r 'to_entries[0].value // empty')
            echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT
            echo "Report URL: $REPORT_URL"
          else
            echo "report_url=" >> $GITHUB_OUTPUT
          fi

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: learn-greek-easy-frontend/lighthouse-reports/
          retention-days: 7

      - name: Parse Lighthouse Results
        working-directory: learn-greek-easy-frontend
        env:
          LIGHTHOUSE_REPORT_URL: ${{ steps.lighthouse.outputs.report_url }}
        run: |
          node scripts/parse-lighthouse-results.cjs

      - name: Upload Lighthouse Summary
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-summary
          path: |
            learn-greek-easy-frontend/lighthouse-summary.json
            learn-greek-easy-frontend/lighthouse-comment.md
          retention-days: 7

      - name: Set Lighthouse Status Check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const desktopScore = parseInt('${{ steps.lighthouse.outputs.desktop_score }}') || 0;
            const mobileScore = parseInt('${{ steps.lighthouse.outputs.mobile_score }}') || 0;
            const reportUrl = '${{ steps.lighthouse.outputs.report_url }}';

            // Determine status based on thresholds
            // Desktop: 80+ = success, 60-79 = warning, <60 = failure
            // Mobile: 70+ = success, 50-69 = warning, <50 = failure
            let state = 'success';
            let description = `Desktop: ${desktopScore}, Mobile: ${mobileScore}`;

            if (desktopScore < 60 || mobileScore < 50) {
              state = 'failure';
              description = `❌ ${description} (below minimum)`;
            } else if (desktopScore < 80 || mobileScore < 70) {
              // Warning state: still success but with warning indicator in description
              // Note: GitHub only supports 'success', 'failure', 'pending', 'error' states
              // Using 'pending' incorrectly appears as "waiting for result", so we use
              // 'success' with a warning emoji in the description instead
              description = `⚠️ ${description} (below target)`;
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.PR_HEAD_SHA,
              state: state,
              target_url: reportUrl || '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: description,
              context: 'preview/lighthouse'
            });

  # =============================================================================
  # JOB: Lighthouse PR Comment
  # Purpose: Post detailed Lighthouse report as a dedicated PR comment
  # =============================================================================
  lighthouse-comment:
    name: Lighthouse PR Comment
    needs: [lighthouse]
    if: needs.lighthouse.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download Lighthouse Summary
        uses: actions/download-artifact@v5
        with:
          name: lighthouse-summary
          path: lighthouse-data/

      - name: Read Comment Body
        id: comment
        run: |
          if [ -f lighthouse-data/lighthouse-comment.md ]; then
            # Read and escape for multiline output
            {
              echo 'body<<EOF'
              cat lighthouse-data/lighthouse-comment.md
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "body=:warning: Lighthouse results are not available." >> $GITHUB_OUTPUT
          fi

      - name: Post Lighthouse Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-report
          message: ${{ steps.comment.outputs.body }}

  # =============================================================================
  # JOB 11: Report Results
  # Purpose: Post/update PR comment with deployment URLs and test results
  # Summarizes: health checks, accessibility, Lighthouse, K6
  # =============================================================================
  report-results:
    name: Report Results
    needs: [changes, should-deploy, deploy, health-check, seed-database, web-verify, k6-performance, accessibility, lighthouse]
    if: always() && needs.changes.outputs.web == 'true' && needs.should-deploy.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post or Update PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const deployStatus = '${{ needs.deploy.result }}';
            const frontendUrl = '${{ needs.deploy.outputs.frontend_url }}';
            // Backend is private - accessed via frontend proxy
            const backendApiUrl = frontendUrl + '/api/v1';
            const envId = '${{ needs.deploy.outputs.environment_id }}';

            // Health check status
            const healthStatus = '${{ needs.health-check.outputs.status }}';
            const healthIcon = healthStatus === 'success' ? ':white_check_mark:' : ':x:';
            const healthDetails = healthStatus === 'success' ? 'All health checks passed' : 'Some health checks failed';

            // Seed database status
            const seedStatus = '${{ needs.seed-database.outputs.status }}' || 'skipped';
            const seedIcon = seedStatus === 'success' ? ':white_check_mark:'
              : seedStatus === 'skipped' ? ':yellow_circle:'
              : ':x:';
            const seedDetails = seedStatus === 'success'
              ? 'Test data seeded'
              : seedStatus === 'skipped'
              ? 'Skipped (not enabled in environment)'
              : 'Seeding failed';

            // Accessibility check status
            const a11yStatus = '${{ needs.accessibility.outputs.status }}' || 'skipped';
            const a11yViolations = '${{ needs.accessibility.outputs.violations }}' || '0';
            const a11yIcon = a11yStatus === 'success' ? ':white_check_mark:'
              : a11yStatus === 'skipped' ? ':yellow_circle:'
              : ':x:';
            const a11yDetails = a11yStatus === 'success'
              ? 'No critical/serious violations'
              : a11yStatus === 'skipped'
              ? 'Skipped (health check failed)'
              : `${a11yViolations} critical/serious violation(s)`;

            // Lighthouse scores
            const desktopScore = '${{ needs.lighthouse.outputs.desktop_score }}' || '0';
            const mobileScore = '${{ needs.lighthouse.outputs.mobile_score }}' || '0';
            const lighthouseReportUrl = '${{ needs.lighthouse.outputs.report_url }}';
            const desktopScoreNum = parseInt(desktopScore) || 0;
            const mobileScoreNum = parseInt(mobileScore) || 0;

            // Lighthouse status icon based on thresholds (Desktop: 80+, Mobile: 70+)
            let lighthouseIcon = ':white_check_mark:';
            if (desktopScoreNum < 60 || mobileScoreNum < 50) {
              lighthouseIcon = ':x:';
            } else if (desktopScoreNum < 80 || mobileScoreNum < 70) {
              lighthouseIcon = ':yellow_circle:';
            }
            const lighthouseDetails = lighthouseReportUrl
              ? `[Desktop: ${desktopScore}, Mobile: ${mobileScore}](${lighthouseReportUrl})`
              : `Desktop: ${desktopScore}, Mobile: ${mobileScore}`;

            // Visual regression (Chromatic) status - DISABLED while reorganizing
            const visualStatus = 'skipped';  // Hardcoded while visual tests are disabled
            const visualIcon = ':yellow_circle:';
            const visualDetails = 'Disabled (reorganizing visual tests)';

            // K6 Performance
            const k6Status = '${{ needs.k6-performance.outputs.status }}' || 'skipped';
            const k6Result = '${{ needs.k6-performance.result }}';
            const k6AuthP95 = '${{ needs.k6-performance.outputs.auth_p95 }}' || 'N/A';
            const k6DashboardP95 = '${{ needs.k6-performance.outputs.dashboard_p95 }}' || 'N/A';

            const k6Icon = k6Result === 'skipped' ? ':yellow_circle:'
              : k6Status === 'success' ? ':white_check_mark:'
              : ':x:';
            const k6Details = k6Result === 'skipped'
              ? 'Skipped (skip-k6 label)'
              : k6Status === 'success'
              ? `Auth p95: ${k6AuthP95}ms, Dashboard p95: ${k6DashboardP95}ms`
              : 'Thresholds not met';

            let body;
            if (deployStatus === 'success') {
              body = `## :rocket: Release Verify\n\n`;

              // Deployment URLs section
              body += `### Deployment URLs\n\n`;
              body += `| Service | URL |\n`;
              body += `|---------|-----|\n`;
              body += `| Frontend | ${frontendUrl} |\n`;
              body += `| Backend API | ${backendApiUrl} (via frontend proxy) |\n`;
              body += `| API Docs | ${frontendUrl}/docs |\n\n`;

              // Test Results section
              body += `### Test Results\n\n`;
              body += `| Test | Status | Details |\n`;
              body += `|------|--------|---------|\n`;
              body += `| Health Check | ${healthIcon} | ${healthDetails} |\n`;
              body += `| Seed Database | ${seedIcon} | ${seedDetails} |\n`;
              body += `| Accessibility | ${a11yIcon} | ${a11yDetails} |\n`;
              body += `| Lighthouse | ${lighthouseIcon} | ${lighthouseDetails} |\n`;
              body += `| Visual Regression | ${visualIcon} | ${visualDetails} |\n`;
              body += `| K6 Performance | ${k6Icon} | ${k6Details} |\n`;
              body += `\n`;

              // Status indicator based on all checks
              const lighthousePassed = desktopScoreNum >= 80 && mobileScoreNum >= 70;
              const lighthouseWarning = desktopScoreNum >= 60 && mobileScoreNum >= 50;
              const visualPassed = visualStatus === 'success' || visualStatus === 'skipped';
              const visualNeedsReview = visualStatus === 'changes_detected';
              const allPassed = healthStatus === 'success' && a11yStatus === 'success' && lighthousePassed && visualPassed;
              const hasWarnings = !allPassed && (
                healthStatus === 'success' &&
                (a11yStatus === 'success' || a11yStatus === 'skipped') &&
                lighthouseWarning &&
                (visualPassed || visualNeedsReview)
              );

              if (allPassed) {
                body += `:white_check_mark: **All checks passed!** Release environment is ready for review.\n\n`;
              } else if (hasWarnings || visualNeedsReview) {
                body += `:warning: **Deployment complete but some checks need attention.** Please review the results above.\n\n`;
              } else {
                body += `:x: **Checks failed.** Please review the results above and fix issues.\n\n`;
              }

              // Deployment metadata (collapsible)
              body += `---\n`;
              body += `<details>\n`;
              body += `<summary>Deployment Info</summary>\n\n`;
              body += `- **Environment**: \`${envId}\`\n`;
              body += `- **Commit**: \`${{ inputs.pr_head_sha }}\`\n`;
              body += `- **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              body += `- **Preview expires**: 24 hours after PR close\n`;
              body += `</details>\n`;
            } else {
              body = `## :rocket: Release Verify\n\n`;
              body += `:x: **Deployment failed**\n\n`;
              body += `Please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n`;

              // Still show metadata for failed deployments
              body += `---\n`;
              body += `<details>\n`;
              body += `<summary>Deployment Info</summary>\n\n`;
              body += `- **Environment**: \`${envId}\`\n`;
              body += `- **Commit**: \`${{ inputs.pr_head_sha }}\`\n`;
              body += `- **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              body += `</details>\n`;
            }

            // Find existing comment (with backward compatibility for old format)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && (
                c.body.includes(':rocket: Release Verify') ||
                c.body.includes(':rocket: Preview Deployment') ||
                // Backward compatibility with old format
                c.body.includes('## Preview Deployment Ready') ||
                c.body.includes('## Preview Deployment Failed') ||
                c.body.includes('## Preview Deployment Skipped') ||
                c.body.includes('## Preview Deployment Blocked')
              )
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ inputs.pr_number }},
                body
              });
            }

  # =============================================================================
  # JOB 12: Skip Comment (Docs-only)
  # Purpose: Post comment when preview is skipped (docs-only changes)
  # =============================================================================
  skip-comment:
    name: Post Skip Comment
    needs: [should-deploy]
    if: needs.should-deploy.outputs.deploy == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Post Skip Comment
        uses: actions/github-script@v7
        with:
          script: |
            let body = `## :rocket: Release Verify\n\n`;
            body += `:information_source: **Skipped** - Documentation changes only\n\n`;
            body += `This PR contains only documentation changes. Preview deployment has been skipped.\n\n`;
            body += `If you need a preview environment, please add code changes or request manual deployment.`;

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && (
                c.body.includes(':rocket: Release Verify') ||
                c.body.includes(':rocket: Preview Deployment') ||
                // Backward compatibility with old format
                c.body.includes('## Preview Deployment Ready') ||
                c.body.includes('## Preview Deployment Failed') ||
                c.body.includes('## Preview Deployment Skipped') ||
                c.body.includes('## Preview Deployment Blocked')
              )
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ inputs.pr_number }},
                body
              });
            }

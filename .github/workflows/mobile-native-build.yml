name: Mobile Native Build (on-demand)

# Deliberately NOT part of `CI Gate`. Opt-in only:
#   - manual run via the Actions tab (workflow_dispatch)
#   - applying the `needs-native-build` label to a PR
# Builds a LOCAL EAS development-profile iOS SIMULATOR app (free on this public
# repo, no cloud build minutes, no code signing / Apple Developer Program) and
# runs the MOB-07 Maestro smoke flow against it.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  ios-simulator-smoke:
    # workflow_dispatch always runs; the labeled event only runs for OUR label.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'needs-native-build'
    runs-on: macos-26   # macos-latest = macos-15 (Xcode 16.4); Xcode 26.x lives only on macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: learn-greek-easy-mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      CI_DEV_LAUNCH_URL: http://127.0.0.1:8081
      # CI smoke placeholders so app.config.ts populates expoConfig.extra and the
      # app boots to the login screen. The smoke makes no real backend call; real
      # dev/Supabase wiring (test users, reset endpoint) is MOB-15. NOT secrets.
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: ci-smoke-placeholder-anon-key
      API_URL: https://placeholder.invalid
      CI_DEV_MENU_ONBOARDING_FINISHED: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Assert Xcode major version 26
        run: |
          XCODE_VERSION="$(xcodebuild -version | head -n1 | awk '{print $2}')"
          echo "xcodebuild reports: $XCODE_VERSION"
          MAJOR="${XCODE_VERSION%%.*}"
          if [ "$MAJOR" != "26" ]; then
            echo "::error::Expected Xcode major 26, got $XCODE_VERSION — gate cannot proceed (no fallback)."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Install EAS CLI + Maestro
        run: |
          npm install -g eas-cli@20.0.0
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Compute native fingerprint
        id: fp
        run: |
          HASH="$(node node_modules/@expo/fingerprint/bin/cli.js \
            fingerprint:generate --platform ios | jq -r .hash)"
          echo "Native fingerprint: $HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache native simulator app
        id: app-cache
        uses: actions/cache@v4
        with:
          path: learn-greek-easy-mobile/build
          key: ios-app-${{ runner.os }}-xcode26.4-development-${{ steps.fp.outputs.hash }}

      - name: Build local dev-profile simulator app
        if: steps.app-cache.outputs.cache-hit != 'true'
        # --local: no cloud build minutes. development profile -> ios.simulator:true,
        # bundle id eu.greeklish.app.dev (matches .maestro/smoke.yaml appId).
        # Simulator build => no signing => no Apple Developer Program needed.
        # Resolved: the native build previously failed under Xcode 16.4 (macos-15)
        # at the precompiled ExpoModulesJSI xcframework script. Fix = macos-26
        # runner + pinned Xcode 26.4 (steps above) + a Metro-served dev-client
        # (the development profile sets developmentClient:true, so JS is served at
        # runtime, not embedded). Opt-in, not a CI Gate.
        run: |
          eas build --local \
            --non-interactive \
            --profile development \
            --platform ios \
            --output ./build.tar.gz

      - name: Extract .app
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p build && tar -xzf build.tar.gz -C build

      - name: Resolve APP_PATH
        run: |
          APP_PATH="$(find build -maxdepth 2 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found under build/ (cache-hit=${{ steps.app-cache.outputs.cache-hit }})"
            exit 1
          fi
          echo "Using app: $APP_PATH  (cache-hit=${{ steps.app-cache.outputs.cache-hit }})"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Boot iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -oE '\([0-9A-F-]{36}\)' | tr -d '()')
          echo "SIM_UDID=$DEVICE" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Install app on simulator
        run: xcrun simctl install "$SIM_UDID" "$APP_PATH"

      - name: Start Metro (dev-client)
        env:
          APP_VARIANT: development
          REACT_NATIVE_PACKAGER_HOSTNAME: 127.0.0.1
        run: |
          # Bind Metro to all interfaces (default lan host = 0.0.0.0) so 127.0.0.1
          # is reachable by both this runner and the simulator's dev-client (which
          # connects to the baked http://127.0.0.1:8081). Do NOT use --localhost:
          # it can bind localhost to ::1 only (Node IPv6-first), making the IPv4
          # 127.0.0.1 connection fail. REACT_NATIVE_PACKAGER_HOSTNAME forces
          # 127.0.0.1 into the served manifest/bundle URLs. CI=1 = non-interactive.
          CI=1 npx expo start --dev-client --port 8081 \
            > "$RUNNER_TEMP/metro.log" 2>&1 &
          echo "METRO_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Metro to be ready
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8081/status >/dev/null 2>&1; then
              echo "Metro is up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "::error::Metro did not become ready on :8081 within 120s"
          cat "$RUNNER_TEMP/metro.log" || true
          exit 1

      - name: Verify dev-client loads the JS bundle from Metro
        run: |
          # The dev-client launch -> bundle-request can race the Metro packager.
          # Retry the cold launch until Metro actually serves the iOS bundle
          # (which also warms Metro for the Maestro smoke's clearState relaunch).
          bundle_served() {
            grep -qiE 'iOS Bundled [0-9]+ ?ms|Bundling complete|\.bundle\?platform=ios|virtual-metro-entry\.bundle' "$RUNNER_TEMP/metro.log"
          }
          for attempt in 1 2 3 4 5; do
            echo "::group::Launch attempt $attempt"
            xcrun simctl terminate "$SIM_UDID" eu.greeklish.app.dev 2>/dev/null || true
            sleep 2
            xcrun simctl launch "$SIM_UDID" eu.greeklish.app.dev --initialUrl http://127.0.0.1:8081 || true
            for i in $(seq 1 60); do
              if bundle_served; then
                echo "Metro served the iOS bundle (attempt $attempt, ${i}s)"
                echo "::endgroup::"
                exit 0
              fi
              sleep 1
            done
            echo "attempt $attempt: bundle not served within 60s, retrying"
            echo "::endgroup::"
          done
          echo "::error::dev-client never requested the JS bundle from Metro after 5 launch attempts"
          cat "$RUNNER_TEMP/metro.log" || true
          exit 1

      - name: TEMP — dump UI hierarchy + screenshot (diagnosis)
        run: |
          sleep 20  # let the app render past the splash overlay
          echo "===== UI HIERARCHY (maestro) ====="
          maestro hierarchy 2>&1 | tee "$RUNNER_TEMP/hierarchy.txt" || true
          echo "===== END UI HIERARCHY ====="
          xcrun simctl io "$SIM_UDID" screenshot "$RUNNER_TEMP/initial-screen.png" || true
          ls -la "$RUNNER_TEMP/initial-screen.png" || true

      - name: Run Maestro smoke flow
        continue-on-error: true   # TEMP: allow cache to save while debugging the smoke
        run: maestro test .maestro/smoke.yaml

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: |
            /Users/runner/.maestro/tests/
            ${{ runner.temp }}/metro.log
            ${{ runner.temp }}/hierarchy.txt
            ${{ runner.temp }}/initial-screen.png
          if-no-files-found: warn
          retention-days: 5

name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for manual trigger)'
        required: false
        type: number

concurrency:
  group: dev-preview-shared
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  # Dev environment URL (backend is private, accessed via frontend proxy)
  DEV_FRONTEND_URL: frontend-dev-8db9.up.railway.app

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  # =============================================================================
  # JOB 0: Check Full Test Conditions
  # Purpose: Determine if full tests should run based on PR state
  # Draft PRs skip full tests, ready PRs run full tests
  # =============================================================================
  should-run-full:
    name: Check Full Test Conditions
    runs-on: ubuntu-latest
    outputs:
      run_full: ${{ steps.check.outputs.run_full }}
    steps:
      - name: Check conditions
        id: check
        run: |
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          EVENT="${{ github.event.action }}"
          IS_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"

          echo "=== Full Test Condition Check ==="
          echo "Event: $EVENT"
          echo "Is Draft: $IS_DRAFT"
          echo "Is workflow_dispatch: $IS_DISPATCH"

          # Run full tests if:
          # 1. Manual workflow_dispatch
          # 2. ready_for_review event (draft -> ready transition)
          # 3. Non-draft PR with standard events (opened, synchronize, reopened)
          if [[ "$IS_DISPATCH" == "true" ]] || \
             [[ "$EVENT" == "ready_for_review" ]] || \
             [[ "$IS_DRAFT" == "false" && ("$EVENT" == "opened" || "$EVENT" == "synchronize" || "$EVENT" == "reopened") ]]; then
            echo "run_full=true" >> $GITHUB_OUTPUT
            echo "Result: Full test suite will run"
          else
            echo "run_full=false" >> $GITHUB_OUTPUT
            echo "Result: Skipping full tests (draft PR)"
          fi

  # =============================================================================
  # JOB 0b: Detect Changed Areas (MOB-01a)
  # Purpose: Split mobile changes from web changes so a mobile-only PR runs ONLY
  # the mobile job and skips the web suite + web preview deploy.
  # web = any non-mobile change (backend/frontend/.github/docs/root) — safe default.
  # mobile = anything under learn-greek-easy-mobile/.
  # =============================================================================
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 'every' = a file must match ALL patterns in a filter to count.
          # Without it (default 'some'), the '**' pattern matches every file, so
          # `web` was always true and a mobile-only PR still ran the web suite.
          # With 'every', a mobile file matches '**' but fails '!learn-greek-easy-mobile/**',
          # so a mobile-only diff yields web=false. (mobile filter has one pattern → unaffected.)
          predicate-quantifier: 'every'
          filters: |
            mobile:
              - 'learn-greek-easy-mobile/**'
            web:
              - '**'
              - '!learn-greek-easy-mobile/**'
              # Docs-only changes don't need the web test suite / preview deploy.
              # (A mixed code+docs PR still runs web: code files pass these negations.)
              - '!**/*.md'
              - '!docs/**'
              - '!**/docs/**'

  # =============================================================================
  # JOB 1: CI Tests
  # Purpose: Run existing CI tests first (lint, unit, integration, E2E)
  # This job uses the reusable workflow defined in test.yml
  # Only runs when full test conditions are met AND web files changed (MOB-01a)
  # =============================================================================
  ci-tests:
    name: CI Tests
    needs: [should-run-full, changes]
    if: needs.should-run-full.outputs.run_full == 'true' && needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # =============================================================================
  # JOB 1b: Mobile CI (MOB-01a)
  # Purpose: tsc + lint for the Expo app. Runs only when mobile files changed.
  # Mobile PR gate: TypeScript check + expo lint + jest-expo unit tests (folded into CI Gate).
  # =============================================================================
  mobile-ci:
    name: Mobile CI (tsc + lint + test)
    needs: [should-run-full, changes]
    if: needs.should-run-full.outputs.run_full == 'true' && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-mobile/package-lock.json

      - name: Install dependencies
        working-directory: learn-greek-easy-mobile
        run: npm ci

      - name: TypeScript check (tsc --noEmit)
        working-directory: learn-greek-easy-mobile
        run: npx tsc --noEmit

      - name: ESLint (expo lint)
        working-directory: learn-greek-easy-mobile
        run: npm run lint

      - name: Jest (jest-expo)
        working-directory: learn-greek-easy-mobile
        run: npx jest --ci

      - name: Token opacity guard (MOB-13)
        working-directory: learn-greek-easy-mobile
        run: node scripts/check-token-opacity.mjs

  # =============================================================================
  # JOB 1c: CI Gate (MOB-01a) — the single REQUIRED status check
  # Purpose: Always runs and reports one definitive pass/fail, regardless of which
  # pipeline(s) ran. Replaces `CI Tests / Frontend tsc -b` as the required check so
  # mobile-only PRs (where the web suite is skipped) are not blocked by an absent
  # web check. Passes iff each pipeline that SHOULD have run succeeded.
  # Release-verify jobs (deploy/seed/verify) are release-gates, NOT required checks.
  # =============================================================================
  ci-gate:
    name: CI Gate
    needs: [should-run-full, changes, ci-tests, mobile-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate required pipelines
        run: |
          run_full="${{ needs.should-run-full.outputs.run_full }}"
          web="${{ needs.changes.outputs.web }}"
          mobile="${{ needs.changes.outputs.mobile }}"
          ci="${{ needs.ci-tests.result }}"
          mob="${{ needs.mobile-ci.result }}"
          echo "run_full=$run_full web=$web mobile=$mobile ci-tests=$ci mobile-ci=$mob"

          if [ "$run_full" != "true" ]; then
            echo "Draft PR (run_full=$run_full) — no required pipelines. CI Gate passes."
            exit 0
          fi

          fail=0
          if [ "$web" = "true" ] && [ "$ci" != "success" ]; then
            echo "::error::Web CI was required (web changed) but its result is '$ci'"
            fail=1
          fi
          if [ "$mobile" = "true" ] && [ "$mob" != "success" ]; then
            echo "::error::Mobile CI was required (mobile changed) but its result is '$mob'"
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "CI Gate passed (web=$web ci-tests=$ci, mobile=$mobile mobile-ci=$mob)"

  # =============================================================================
  # JOB: Backend Coverage Comment
  # Purpose: Post coverage report as a sticky PR comment
  # Uses pytest-coverage-comment action to display detailed coverage metrics
  # =============================================================================
  backend-coverage-comment:
    name: Backend Coverage Comment
    needs: [ci-tests]
    if: github.event_name == 'pull_request' && needs.ci-tests.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage-report
          path: coverage-data/

      - name: Post Coverage Comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./coverage-data/pytest-coverage.txt
          pytest-xml-coverage-path: ./coverage-data/coverage.xml
          junitxml-path: ./coverage-data/pytest.xml
          title: Backend Coverage Report
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          report-only-changed-files: false
          create-new-comment: false
          unique-id-for-comment: coverage-report
          coverage-path-prefix: learn-greek-easy-backend/src/
          default-branch: main

      - name: Add Artifact Link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-artifact-link
          message: |
            :bar_chart: [View Full Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # =============================================================================
  # JOB: Draft Skip Comment
  # Purpose: Post comment when full tests are skipped (draft PR)
  # =============================================================================
  draft-skip-comment:
    name: Post Draft Skip Comment
    needs: [should-run-full]
    if: needs.should-run-full.outputs.run_full == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Post Draft Skip Comment
        uses: actions/github-script@v9
        with:
          script: |
            const body = `## :rocket: Preview Deployment\n\n` +
              `:yellow_circle: **Skipped** - Draft PR\n\n` +
              `Full tests and deployment are skipped for draft PRs to save CI minutes.\n\n` +
              `**Quick checks** (lint, format, typecheck) run on every commit.\n\n` +
              `**To trigger full tests:** Mark PR as "Ready for review"`;

            // Find existing preview comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && (
                c.body.includes(':rocket: Preview Deployment') ||
                // Backward compatibility with old format
                c.body.includes('## Preview Deployment Ready') ||
                c.body.includes('## Preview Deployment Failed') ||
                c.body.includes('## Preview Deployment Skipped') ||
                c.body.includes('## Preview Deployment Blocked')
              )
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # =============================================================================
  # JOB: Dispatch Release Verify
  # Purpose: When 'ready-to-verify' label is added, dispatch release-verify.yml
  # with PR context as inputs, acquiring the dev-release-lease concurrency lock.
  # =============================================================================
  dispatch-release-verify:
    name: Dispatch Release Verify
    if: github.event.action == 'labeled' && github.event.label.name == 'ready-to-verify'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-verify.yml',
              ref: context.payload.pull_request.head.ref,
              inputs: {
                pr_number: String(context.issue.number),
                pr_head_sha: context.payload.pull_request.head.sha,
                pr_head_ref: context.payload.pull_request.head.ref,
                pr_labels: JSON.stringify(context.payload.pull_request.labels.map(l => l.name)),
              },
            });

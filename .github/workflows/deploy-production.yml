name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_health_check:
        description: 'Skip post-deploy health check'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel in-progress prod deploys

env:
  # Production environment URL (backend is private, accessed via frontend proxy)
  PROD_FRONTEND_URL: https://greeklish.eu

permissions:
  contents: read
  deployments: write

jobs:
  # =============================================================================
  # JOB 1: Pre-Deploy Validation
  # Purpose: Ensure we're deploying from main branch with valid commit
  # =============================================================================
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Verify deployment source
        run: |
          echo "=== Pre-Deploy Validation ==="
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "WARNING: Production deploys should be from main branch"
            echo "Current ref: ${{ github.ref }}"
          fi

  # =============================================================================
  # JOB 1b: Frontend tsc -b on main — REQUIRED gate (TSCI-01-10)
  # Mirrors the `tsc-build` job in test.yml. Runs on every push to main.
  # Wired into `deploy-backend` needs — production deploy is gated on this job.
  # There is no skip mechanic — TS errors must be 0 to deploy to production.
  # =============================================================================
  tsc-build:
    name: Frontend tsc -b
    runs-on: ubuntu-latest
    env:
      VITE_ENVIRONMENT: test
      ENVIRONMENT: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-frontend/package-lock.json

      - name: Install dependencies
        working-directory: learn-greek-easy-frontend
        run: npm ci

      - name: Run tsc -b and report error count
        working-directory: learn-greek-easy-frontend
        run: |
          set +e
          npm run typecheck:ci 2>&1 | tee tsc.log
          TSC_EXIT=${PIPESTATUS[0]}
          ERROR_COUNT=$(grep -c "error TS" tsc.log || true)
          echo "## tsc -b results (main)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit code: \`$TSC_EXIT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Error count: **$ERROR_COUNT**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Required gate: 0 errors to pass._" >> "$GITHUB_STEP_SUMMARY"
          exit $TSC_EXIT

      # Type-check the TEST files too (INFRA-06 / I18NG-01). Mirrors test.yml.
      # `tsc -b` above only covers app+node sources; this standalone pass checks
      # vitest + playwright specs. 0 errors required to deploy.
      - name: Type-check test files (typecheck:test)
        working-directory: learn-greek-easy-frontend
        run: npm run typecheck:test

  # =============================================================================
  # JOB 1c: Detect Changed Areas (MOB-01a)
  # Purpose: A mobile-only merge to main must NOT redeploy backend/frontend.
  # web = any non-mobile change. On push, paths-filter diffs against the previous
  # main commit, so `web` reflects what the merged PR actually changed.
  # =============================================================================
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # 'every' = a file must match ALL patterns in a filter to count. Without it
          # (default 'some'), '**' matches every file so `web` was always true. With
          # 'every', a mobile file matches '**' but fails '!learn-greek-easy-mobile/**',
          # so a mobile-only push yields web=false.
          predicate-quantifier: 'every'
          filters: |
            web:
              - '**'
              - '!learn-greek-easy-mobile/**'
              # Docs-only changes don't need the web suite / deploy.
              # (A mixed code+docs push still deploys: code files pass these negations.)
              - '!**/*.md'
              - '!docs/**'
              - '!**/docs/**'
            mobile:
              - 'learn-greek-easy-mobile/**'

  # =============================================================================
  # JOB 1d: Mobile Production OTA (MOB08-04)
  # Purpose: Publish an OTA update to the production EAS channel on mobile-
  # touching merges to main. Non-mobile merges skip this job.
  # =============================================================================
  mobile-ota:
    name: Mobile Production OTA (eas update)
    needs: [pre-deploy-check, changes]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: learn-greek-easy-mobile/package-lock.json

      - name: Install dependencies
        working-directory: learn-greek-easy-mobile
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production channel
        working-directory: learn-greek-easy-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas update \
            --branch production \
            --environment production \
            --message "main@${{ github.sha }}" \
            --non-interactive
        timeout-minutes: 15

  # =============================================================================
  # JOB 2: Deploy Backend
  # Purpose: Deploy backend service and wait for health check
  # Skipped on mobile-only merges (web == false) — MOB-01a.
  # =============================================================================
  deploy-backend:
    name: Deploy Backend
    needs: [pre-deploy-check, tsc-build, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    environment:
      name: production
      # Backend is private - no public URL, accessed via frontend proxy
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Show deployment context
        run: |
          echo "=== Production Backend Deployment ==="
          echo "Commit: ${{ github.sha }}"
          echo "Short SHA: $(echo ${{ github.sha }} | cut -c1-7)"
          echo "Railway CLI Version:"
          railway --version

      - name: Link to production environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment production \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

      - name: Set version variables on Backend service
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Set Backend version vars attempt $attempt..."
            if railway variables \
              --set "RAILWAY_GIT_COMMIT_SHA=${{ github.sha }}" \
              --set "RAILWAY_GIT_BRANCH=${{ github.ref_name }}" \
              --service Backend \
              --skip-deploys; then
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Set Backend version vars attempt $attempt failed; retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Set Backend version vars failed after 3 attempts."
              exit 1
            fi
          done

      - name: Deploy Backend (wait for health)
        id: deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          cd learn-greek-easy-backend
          echo "Starting production Backend deployment..."
          echo "This will wait for the deployment to complete and pass health checks."

          # Deploy with --ci flag to wait for health check; retry on transient control-plane errors
          for attempt in 1 2 3; do
            echo "Backend deploy attempt $attempt..."
            if railway up --ci --service Backend; then
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Backend deploy attempt $attempt failed; retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Backend deploy failed after 3 attempts."
              exit 1
            fi
          done

          echo "Backend deployment completed successfully!"
          echo "deployment_id=$(date +%s)" >> $GITHUB_OUTPUT
        timeout-minutes: 10

  # =============================================================================
  # JOB 3: Deploy Frontend
  # Purpose: Deploy frontend service after backend, with fresh DNS to discover new backend IP
  #
  # WHY THIS ORDER MATTERS:
  # - Backend is private (no public URL), only accessible via frontend Caddy proxy
  # - Frontend uses Caddy to proxy /api/* to backend.railway.internal:8080
  # - When backend redeploys, it gets a NEW internal IP address
  # - Railway's internal DNS needs ~10-15 seconds to propagate the new IP
  # - If we warm-up BEFORE frontend redeploys, the old frontend has STALE DNS
  #   pointing to the old backend IP, causing 502 errors
  # - By deploying frontend AFTER backend + DNS delay, the new frontend container
  #   starts fresh and discovers the correct new backend IP
  # =============================================================================
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend  # Sequential dependency - waits for backend deployment
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    environment:
      name: production
      url: ${{ env.PROD_FRONTEND_URL }}
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Wait for Railway internal DNS propagation
        run: |
          echo "=== Waiting for Railway Internal DNS Propagation ==="
          echo "Backend just deployed and received a new internal IP."
          echo "Railway's internal DNS (backend.railway.internal) needs time to update."
          echo "Waiting 60 seconds to ensure DNS propagation before frontend deployment..."
          sleep 60
          echo "DNS propagation delay complete. Proceeding with frontend deployment."

      - name: Show deployment context
        run: |
          echo "=== Production Frontend Deployment ==="
          echo "Commit: ${{ github.sha }}"
          echo "Backend deployment completed - proceeding with Frontend"
          echo "Frontend will start fresh and discover new backend IP via Railway internal DNS"
          echo "Railway CLI Version:"
          railway --version

      - name: Link to production environment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway link \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment production \
            --workspace ${{ secrets.RAILWAY_WORKSPACE_ID }}

      - name: Set version variables on Frontend service
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Set Frontend version vars attempt $attempt..."
            if railway variables \
              --set "RAILWAY_GIT_COMMIT_SHA=${{ github.sha }}" \
              --service Frontend \
              --skip-deploys; then
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Set Frontend version vars attempt $attempt failed; retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Set Frontend version vars failed after 3 attempts."
              exit 1
            fi
          done

      - name: Deploy Frontend (wait for health)
        id: deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          cd learn-greek-easy-frontend
          echo "Starting production Frontend deployment..."
          echo "This will wait for the deployment to complete and pass health checks."

          # Deploy with --ci flag to wait for health check; retry on transient control-plane errors
          for attempt in 1 2 3; do
            echo "Frontend deploy attempt $attempt..."
            if railway up --ci --service Frontend; then
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Frontend deploy attempt $attempt failed; retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            else
              echo "Frontend deploy failed after 3 attempts."
              exit 1
            fi
          done

          echo "Frontend deployment completed successfully!"
          echo "deployment_id=$(date +%s)" >> $GITHUB_OUTPUT
        timeout-minutes: 10

  # =============================================================================
  # JOB 4: Warm-up Backend
  # Purpose: Warm up backend via frontend proxy to initialize connection pools
  # and verify the frontend->backend routing is working correctly
  #
  # This runs AFTER frontend deploys so the new frontend container has fresh DNS
  # pointing to the new backend IP. The warmup request verifies end-to-end connectivity.
  # =============================================================================
  warmup-backend:
    name: Warm-up Backend
    needs: deploy-frontend  # Must run after frontend has fresh DNS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run warmup script
        run: |
          # Use frontend URL since backend is private (no public domain)
          # Frontend proxies /api/* to backend via internal network
          # Now that frontend is freshly deployed, it has the correct DNS for new backend
          chmod +x scripts/backend-warmup.sh
          # Backend is private - warmup via frontend proxy using /api/v1/health endpoints
          ./scripts/backend-warmup.sh "${{ env.PROD_FRONTEND_URL }}" 10 3

  # =============================================================================
  # JOB 5: Post-Deploy Health Check
  # Purpose: Verify both services are responding correctly
  # =============================================================================
  post-deploy-health:
    name: Post-Deploy Health Check
    needs: warmup-backend
    if: ${{ !inputs.skip_health_check }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Wait for DNS propagation
        run: |
          echo "Waiting 10 seconds for DNS propagation..."
          sleep 10

      - name: Run Health Checks
        run: |
          echo "=== Post-Deploy Health Verification ==="

          # Backend health check via frontend proxy (backend is private)
          echo "Checking Backend health via frontend proxy..."
          BACKEND_HEALTH=$(curl -sf "${{ env.PROD_FRONTEND_URL }}/api/v1/health" || echo "FAILED")
          echo "Backend /api/v1/health: $BACKEND_HEALTH"

          BACKEND_READY=$(curl -sf "${{ env.PROD_FRONTEND_URL }}/api/v1/health/ready" || echo "FAILED")
          echo "Backend /api/v1/health/ready: $BACKEND_READY"

          # Frontend health check (index page)
          echo "Checking Frontend..."
          FRONTEND_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ env.PROD_FRONTEND_URL }}" || echo "000")
          echo "Frontend HTTP status: $FRONTEND_STATUS"

          # Verify results
          if [ "$BACKEND_HEALTH" = "FAILED" ] || [ "$BACKEND_READY" = "FAILED" ]; then
            echo "ERROR: Backend health check failed!"
            exit 1
          fi

          if [ "$FRONTEND_STATUS" != "200" ]; then
            echo "ERROR: Frontend health check failed! Status: $FRONTEND_STATUS"
            exit 1
          fi

          echo "All health checks passed!"

  # =============================================================================
  # JOB 6: Deployment Summary
  # Purpose: Report deployment status
  #
  # Deployment order: Backend -> Frontend -> Warmup -> Health Check
  # This order ensures frontend gets fresh DNS to discover new backend IP
  # =============================================================================
  summary:
    name: Deployment Summary
    needs: [deploy-backend, deploy-frontend, warmup-backend, post-deploy-health]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Backend Warmup | ${{ needs.warmup-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Health Check | ${{ needs.post-deploy-health.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URLs**:" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ env.PROD_FRONTEND_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend API: ${{ env.PROD_FRONTEND_URL }}/api/v1 (via frontend proxy)" >> $GITHUB_STEP_SUMMARY

          # Detect backend-succeeded / frontend-failed (version-skew state) and alert loudly.
          # This catches the ADMIN2-37 incident class: a transient control-plane timeout kills
          # the frontend deploy while backend already advanced — leaving prod on mismatched SHAs.
          if [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-frontend.result }}" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ⚠️ PARTIAL DEPLOYMENT — backend advanced, frontend did NOT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Prod is now in a **version-skew state** (backend ahead of frontend)." >> $GITHUB_STEP_SUMMARY
            echo "Re-run the frontend deploy job or roll back immediately to restore parity." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required:** re-run failed jobs on this workflow run, or push a trivial commit to trigger a clean deploy." >> $GITHUB_STEP_SUMMARY
            echo "::error::PARTIAL DEPLOYMENT: backend advanced to ${{ github.sha }} but frontend deploy FAILED. Prod is in version-skew. Re-run frontend deploy immediately."
            exit 1
          fi

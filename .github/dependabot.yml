version: 2
updates:
  # Python backend — Dependabot reads pyproject.toml + poetry.lock via the pip ecosystem.
  - package-ecosystem: "pip"
    directory: "/learn-greek-easy-backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle minor and patch updates into a single weekly PR to reduce noise.
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — keeps workflow action versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

# Smoke flow: verifies the app launches and reaches the signed-out entry screen.
# Targets the development-variant dev-client bundle (eu.greeklish.app.dev).
# Auth navigation is owned by MOB-03; the entry point is always the login screen.
appId: eu.greeklish.app.dev
---
- launchApp:
    clearState: true
# Maestro has no "label" selector — a React Native accessibilityLabel is
# surfaced through the standard text matcher, so "Sign in" is asserted as text.
- assertVisible: "Welcome back"
- assertVisible: "Sign in"

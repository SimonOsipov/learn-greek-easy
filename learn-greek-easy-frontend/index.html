<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme initialization - prevents flash of wrong theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <!-- Bounded chunk-error reload guard (PERF-25 / F1 mitigation).
         Pre-auth route modules are now eagerly imported, so a failed fetch of an
         app entry asset can no longer be recovered by lazyWithRetry before React
         boots. This classic (non-module) capture-phase listener does at most 3
         bounded page reloads (sessionStorage-counted, 60s cooldown) while the
         #lcp-shell is still up; once React boots it goes inert and defers to
         ChunkErrorBoundary. Mirrors the discipline in src/lib/versionCheck.ts
         (distinct sessionStorage key). Must run BEFORE the entry
         <script type="module"> to catch that graph's own load failure. -->
    <script>
      (function () {
        var CAP = 3, COOLDOWN_MS = 60000, KEY = 'learn-greek-easy:chunk-error-reload';
        window.addEventListener('error', function (e) {
          var t = e.target;
          if (!t || t === window) return;                          // runtime JS error — ignore
          if (document.getElementById('lcp-shell') === null) return; // React booted — defer to ChunkErrorBoundary
          var isModule  = t.tagName === 'SCRIPT' && t.src && t.src.indexOf(location.origin) === 0;
          var isPreload = t.tagName === 'LINK'   && t.rel === 'modulepreload';
          if (!isModule && !isPreload) return;                     // not an app entry asset
          try {
            var s = JSON.parse(sessionStorage.getItem(KEY) || '{"n":0,"t":0}');
            if (s.n >= CAP) return;                                // cap reached — stop (no infinite loop)
            if (s.n > 0 && Date.now() - s.t < COOLDOWN_MS) return; // cooldown active
            sessionStorage.setItem(KEY, JSON.stringify({ n: s.n + 1, t: Date.now() }));
          } catch (err) { return; }                                // storage blocked — don't reload
          location.reload();
        }, true);   // <-- capture phase (resource-load errors don't bubble)
      })();
    </script>
    <!-- Preconnect hints for external origins -->
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://eu.i.posthog.com" crossorigin />
    <link rel="preconnect" href="https://o4510597104009216.ingest.de.sentry.io" crossorigin />
    <!-- LCP image origin (Railway Object Storage, the host presigned image URLs serve from). NO crossorigin: a plain <img> is a non-CORS request, so the anonymous socket is the one the image reuses; a crossorigin preconnect would warm a separate CORS socket the <img> can't reuse. -->
    <link rel="preconnect" href="https://storage.railway.app" />
    <link rel="dns-prefetch" href="https://storage.railway.app" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter 400-700 is self-hosted via @fontsource/inter (see src/main.tsx); only the
         not-self-hosted families/weights are loaded from Google, and non-render-blocking. -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap"
      />
    </noscript>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn and practice Greek Language on interactive platform with spaced repetition, exercises and exam preparation." />
    <meta name="keywords" content="Greek language, Cypriot Citizenship Exam, Greek language learning, Ellinomatheia" />
    <meta name="author" content="Greeklish" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://greeklish.eu" />
    <meta property="og:title" content="Greeklish - Your Learning Greek Companion" />
    <meta property="og:description" content="Learn and practice Greek Language on interactive platform with spaced repetition, exercises and exam preparation." />
    <meta property="og:image" content="https://greeklish.eu/og-image.png" />
    <meta property="og:site_name" content="Greeklish" />
    <title>Greeklish - Learn and Practice all aspects of the Greek language</title>
  </head>
  <body>
    <!-- LCP shell outside root with id for JS targeting.
         Renders a centered spinner that matches the React auth/page loaders
         (Loader2 on bg-background) so the pre-React → React handoff is seamless
         instead of flashing a distinct "Welcome Back" card first. Colors are the
         resolved --background / --primary tokens (light + dark), inlined so the
         shell is correct even before index.css has loaded (dev). -->
    <div id="lcp-shell" class="lcp-shell" role="status" aria-label="Loading">
      <style>
        .lcp-shell {
          display: flex;
          min-height: 100vh;
          align-items: center;
          justify-content: center;
          background: hsl(220 30% 98%);
        }
        .lcp-spinner {
          width: 2rem;
          height: 2rem;
          color: hsl(221 83% 53%);
          animation: lcp-spin 1s linear infinite;
        }
        @keyframes lcp-spin { to { transform: rotate(360deg); } }
        /* Dark mode — .dark is set pre-React by the theme script in <head> */
        .dark .lcp-shell { background: hsl(224 35% 6%); }
        .dark .lcp-spinner { color: hsl(221 90% 65%); }
      </style>
      <svg
        class="lcp-spinner"
        xmlns="http://www.w3.org/2000/svg"
        width="32"
        height="32"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
    </div>

    <!-- React root - starts empty -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
